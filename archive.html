
<!DOCTYPE html>
<html lang="en">
<head>
  <title>Data Portfolio</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
</head>
<body>
  <header id="header">
    <div class="content">
      <h1>Archived Projects</h1>
      <p></p>
      <p>projects that highlight past efforts, milestones and learning</p>
    </div>
    <div class="image header">
      <div class="inner">
        <img src="images/header.gif" alt="" />
      </div>
    </div>
  </header>

  <section id="archive-container" class="spotlights"></section>

  <script>
    fetch('projects.json')
      .then(response => response.json())
      .then(projects => {
        projects.sort((a, b) => a.index - b.index);
        const archivedProjects = projects.slice(3);
        const container = document.getElementById('archive-container');

        archivedProjects.forEach((project, index) => {
          const section = document.createElement('section');
          section.className = 'spotlight style' + ((index % 2 === 0) ? '1' : '2');
          section.innerHTML = `
            <span class="image">
              <img src="${project.image}" alt="${project.title}" />
            </span>
            <div class="content">
              <h3>${project.title}</h3>
              <p>${project.description}</p>
              ${project.tools ? `<p class="tools">Tools Used: ${project.tools.join(", ")}</p>` : ''}
              <ul class="actions">
                <li><a href="${project.url}" class="button" target="_blank">Learn More</a></li>
              </ul>
            </div>

          `;
          container.appendChild(section);
        });
      });
  </script>
</body>
</html>
