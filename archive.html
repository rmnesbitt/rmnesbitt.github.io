        <!-- Header -->

                <div class="content">
                    <h1>Portfolio Archive</h1>
                    <p></p>
                    <p>past efforts, milestones and lessons learned</p>
                </div>
              <div class="image header"><div class="inner"><img src="images/search-2.png" alt="header image" /></div></div>
            </header>

        <!-- Proficiencies
            <section id="one" class="wrapper style2 special">
                <header class="major">

                </header>
                <ul class="icons major">

        <!-- Projects -->
            <section id="archive-container" class="spotlights"></section>

            <script>
              fetch('projects.json')
                      .then(response => response.json())
                      .then(projects => {
                        projects.sort((a, b) => a.index - b.index);
                        const archivedProjects = projects.slice(3);
                        const container = document.getElementById('archive-container');

                        archivedProjects.forEach((project, index) => {
                          const section = document.createElement('section');
                          section.className = 'spotlight style' + ((index % 2 === 0) ? '1' : '2');
                          section.innerHTML = `
                <span class="image">
                  <img src="${project.image}" alt="${project.title}" />
                </span>
                <div class="content">
                  <h3>${project.title}</h3>
                  <p>${project.description}</p>
                    ${project.tools ? `
					  <p class="tools">
					  <span class="tool-label">Tools:</span>
						${project.tools.map(tool => `<span class="tool-icon ${tool}" title="${tool}"></span>`).join("")}
					  </p>                  <ul class="actions">
                    <li><a href="${project.url}" class="button" target="_blank">Learn More</a></li>
                  </ul>
                </div>

              `;
                          container.appendChild(section);
                        });
                      });
            </script>
