<!DOCTYPE HTML>
<html>
	<head>
		<title>Data Portfolio</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload">

		<!-- Header -->
			<header id="header">
				<div class="content">
					<h1>Hi, I'm Ryan</h1>
					<p></p>
					<p>i.  love.  data</p>
				</div>
				<div class="image header"><div class="inner"><img src="images/header.gif" alt="" /></div></div>
			</header>

		<!-- Proficiencies -->
			<section id="one" class="wrapper style2 special">
				<header class="major">
					<h2>Proficiencies</h2>
				</header>
				<ul class="icons major">
					<li>
						<span class="icon sql"></span>
						<span class="label">SQL</span>
					</li>
					<li>
						<span class="icon python"></span>
						<span class="label">Python</span>
					</li>
					<li>
						<span class="icon tableau"></span>
						<span class="label">Tableau</span>
					</li>
					<li>
						<span class="icon excel"></span>
						<span class="label">Excel</span>
					</li>
					<li>
						<span class="icon powerpoint"></span>
						<span class="label">PowerPoint</span>
					</li>
				</ul>
			</section>

		<!-- Projects -->
			<section id="project-container" class="spotlights"></section>

			<script>
				fetch('projects.json')
						.then(response => response.json())
						.then(projects => {
							projects.sort((a, b) => a.index - b.index);
							const latestProjects = projects.slice(0, 3);
							const container = document.getElementById('project-container');

							latestProjects.forEach((project, index) => {
								const section = document.createElement('section');
								section.className = 'spotlight style' + ((index % 2 === 0) ? '1' : '2');
								section.innerHTML = `
			  <span class="image">
				<img src="${project.image}" alt="${project.title}" />
			  </span>
				<div class="content">
				  <h3>${project.title}</h3>
				  <p>${project.description}</p>
				  ${project.tools ? `<p class="tools">Tools Used: ${project.tools.join(", ")}</p>` : ''}
				  <ul class="actions">
					<li><a href="${project.url}" class="button" target="_blank">Learn More</a></li>
				  </ul>
				</div>

			`;
								container.appendChild(section);
							});

							// 🔽 Inject Archive card as a pseudo-project
							const archiveSection = document.createElement('section');
							archiveSection.className = 'spotlight style' + ((latestProjects.length % 2 === 0) ? '1' : '2'); // continue staggering

							archiveSection.innerHTML = `
			<span class="image">
			  <img src="images/search.png" alt="Prior Work" />
			</span>
			<div class="content">
			  <h3>Earlier Work</h3>
			  <p>Browse projects that reflect my learning milestones and early experiences.</p>
			  <ul class="actions">
				<li><a href="archive.html" class="button">Learn More</a></li>
			  </ul>
			</div>
		  `;

							container.appendChild(archiveSection);
						});
			</script>


		<!-- Footer -->
			<footer id="footer">
				<ul class="icons">
					<li>
						<a href="https://www.linkedin.com/in/rmnesbitt/" class="icon linkedin"></a>
						<span class="label">LinkedIn</span>
					</li>
					<li>
						<a href="mailto:rmnesbitt@gmail.com" class="icon email"></a>
						<span class="label">rmnesbitt@gmail.com</span>
					</li>
					<li>
						<a href="tel:+19197717515" class="icon phone"></a>
						<span class="label">919-771-7515</span>
					</li>
				</ul>
			</footer>

		<!-- Scripts -->
			<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/jquery.scrolly.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>

	<div id="project-container" class="projects"></div>
</body>
</html>
